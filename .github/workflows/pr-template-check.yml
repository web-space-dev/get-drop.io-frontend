name: PR Quality Check

on:
  pull_request:
    types: [opened, edited]

jobs:
  check-pr-template:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Content
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const requiredSections = [
              "## Task",
              "## What is included in this PR",
              "## How can we test your branch?",
            ];

            const missingSections = requiredSections.filter(
              (section) => !body.includes(section)
            );

            if (missingSections.length > 0) {
              core.setFailed(
                `Missing required sections in PR description:\n${missingSections.join(
                  "\n"
                )}`
              );
              return;
            }

            const sections = body
              .split("##")
              .filter(Boolean)
              .filter((section) => {
                const sectionName = section.split("\n")[0].trim();
                return sectionName.length > 0;
              });

            const emptySections = sections.filter((section) => {
              const content = section.split("\n").slice(1).join("\n").trim();
              return (
                !content ||
                content === "Copy the link to the task from Shortcut" ||
                content === "Description of what has been done" ||
                content ===
                  "Please add one or two screenshots of this solution, or add a link to a jam.dev where you showcase your solution"
              );
            });

            if (emptySections.length > 0) {
              const emptySectionNames = emptySections.map((section) =>
                section.split("\n")[0].trim()
              );
              core.setFailed(
                `The following sections are empty or contain default text:\n${emptySectionNames.join(
                  "\n"
                )}`
              );
              return;
            }

            const checklistSection = sections.find((section) =>
              section.includes("How can we test your branch?")
            );
            if (checklistSection) {
              const checklistItems = checklistSection
                .split("\n")
                .filter(
                  (line) =>
                    line.trim().startsWith("- [ ]") || line.trim().startsWith("- [x]")
                );

              if (checklistItems.length === 0) {
                core.setFailed(
                  'No checklist items found in "How can we test your branch?" section'
                );
                return;
              }

              const emptyChecklistItems = checklistItems.filter(
                (item) => item.replace("- [ ]", "").replace("- [x]", "").trim() === "......"
              );

              if (emptyChecklistItems.length > 0) {
                core.setFailed('Found empty checklist items (containing "......")');
                return;
              }
            }

  checks:
    needs: check-pr-template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: npm run format:check

      - name: Run linter
        run: npm run lint
